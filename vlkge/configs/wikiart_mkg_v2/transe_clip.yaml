# TransE + CLIP on WikiArt-MKG-v2

dataset: wikiart_mkg_v2
data_path: vlkge/data/wikiart_mkg_v2/wikiart_mkg_v2_triples.csv

visual_features_path: vlkge/data/wikiart_mkg_v2/features/wikiart_mkg_v2_vf_clip.pkl
textual_features_path: vlkge/data/wikiart_mkg_v2/features/wikiart_mkg_v2_tf_clip.pkl
normalize_visual: false
normalize_textual: false

model: TransE
embedding_dim: 768
fusion_mode: average
use_structural: true
use_visual: true
use_textual: true
freeze_visual: true
freeze_textual: true

# TransE-specific
p_norm: 1
normalize_relations: true
margin: 12.0

epochs: 20
batch_size: 512
lr: 0.1
num_neg_samples: 1
use_scheduler: false
evaluate_every: 1

# WikiArt-v2 specific
use_per_relation_candidates: true
bidirectional_eval: false
inductive: true
modality_asymmetry: true
exclude_relations_eval: ['isRelatedToArtwork', 'isRelatedToArtist', 'hasCreatedArtwork']
add_inverse_relations: ['isCreatedByArtist:hasCreatedArtwork']
artist2artist_relations: ['isInfluencedBy', 'isInfluencedOn', 'isPupilOf', 'isTeacherOf']
downsample_relation: 'isRelatedToArtwork'
downsample_fraction: 0.001

top_k: [1, 3, 10]
seed: 42