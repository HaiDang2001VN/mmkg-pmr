# DistMult + CLIP on WikiArt-MKG-v1

dataset: wikiart_mkg_v1
data_path: vlkge/data/wikiart_mkg_v1/wikiart_mkg_v1_triples.csv

visual_features_path: vlkge/data/wikiart_mkg_v1/features/wikiart_mkg_v1_vf_clip.pkl
textual_features_path: vlkge/data/wikiart_mkg_v1/features/wikiart_mkg_v1_tf_clip.pkl
normalize_visual: false
normalize_textual: false

model: DistMult
embedding_dim: 768
fusion_mode: average
use_structural: true
use_visual: true
use_textual: true
freeze_visual: true
freeze_textual: true

epochs: 50
batch_size: 512
lr: 0.1
num_neg_samples: 1
use_scheduler: false
evaluate_every: 1

# WikiArt-v1 specific
use_per_relation_candidates: true
bidirectional_eval: false
inductive: true
modality_asymmetry: true

top_k: [1, 3, 10]
seed: 42